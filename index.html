<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" sizes="32x32" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#111114">
    <title>PlayCode · Support Workspace</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ========== PROFESSIONAL GOOGLE MATERIAL 3 THEME (DARK MODE) ========== */
        ::-webkit-scrollbar { display: none; width: 0; background: transparent; }
        * { -ms-overflow-style: none; scrollbar-width: none; margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        :root {
            --md-sys-color-primary: #A8C7FA;
            --md-sys-color-on-primary: #062E6F;
            --md-sys-color-primary-container: #0842A0;
            --md-sys-color-on-primary-container: #D3E3FD;
            --md-sys-color-surface: #111114; 
            --md-sys-color-surface-container: #1E1F22; 
            --md-sys-color-surface-container-high: #2B2D31;
            --md-sys-color-on-surface: #E2E2E2;
            --md-sys-color-on-surface-variant: #C4C7C5;
            --md-sys-color-outline: #8E918F;
            --md-sys-color-outline-variant: #444746;
            --md-sys-color-error: #F2B8B5;
            --md-sys-color-success: #81C995;
            
            --font-family-display: 'Google Sans', -apple-system, Roboto, sans-serif;
            --font-family-base: 'Roboto', -apple-system, sans-serif;
            --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px; --radius-full: 9999px;
            --transition-standard: 200ms cubic-bezier(0.2, 0, 0, 1);
        }

        /* MOBILE OPTIMIZATION: FIXED BODY & 100dvh PREVENTS KEYBOARD OVERLAP */
        html, body { 
            font-family: var(--font-family-display); 
            background-color: var(--md-sys-color-surface); 
            color: var(--md-sys-color-on-surface); 
            height: 100%; 
            height: 100dvh; 
            width: 100%;
            position: fixed; 
            overflow: hidden; 
            overscroll-behavior-y: none;
        }
        
        .screen { 
            display: none; 
            position: absolute; 
            top: 0; bottom: 0; left: 0; right: 0; 
            flex-direction: column; 
            animation: fadeIn 0.3s ease; 
        }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== BUTTONS & INPUTS ===== */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 24px; min-height: 48px; font-size: 14px; font-weight: 500; border-radius: var(--radius-full); border: none; cursor: pointer; transition: all var(--transition-standard); font-family: var(--font-family-display); }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
        .btn-secondary { background: transparent; color: var(--md-sys-color-primary); border: 1px solid var(--md-sys-color-outline); }
        .btn-danger { background: var(--md-sys-color-error); color: #601410; }
        .btn-block { width: 100%; }
        
        .form-control { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--md-sys-color-outline); border-radius: var(--radius-sm); font-size: 16px; color: var(--md-sys-color-on-surface); transition: all 0.2s; font-family: var(--font-family-base); }
        .form-control:focus { outline: none; border: 2px solid var(--md-sys-color-primary); padding: 15px; }

        /* ===== LOGIN SCREEN ===== */
        .login-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }
        .auth-box { background: var(--md-sys-color-surface-container); border: 1px solid var(--md-sys-color-outline-variant); border-radius: var(--radius-xl); padding: 32px 24px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); text-align: center; }
        .logo-icon { width: 56px; height: 56px; background: var(--md-sys-color-surface-container-high); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; color: var(--md-sys-color-primary); margin-bottom: 20px; }
        
        /* ===== LOADER ===== */
        .loader-screen { justify-content: center; align-items: center; background: var(--md-sys-color-surface); z-index: 100; position: absolute; top:0; left:0; width:100%; height:100%; }
        .pulse-dot { width: 48px; height: 48px; border: 4px solid var(--md-sys-color-surface-container-high); border-top: 4px solid var(--md-sys-color-primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px; }
        #loaderText { font-size: 16px; color: var(--md-sys-color-on-surface); font-weight: 500; letter-spacing: 0.5px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== CHAT UI ===== */
        .chat-header { background: var(--md-sys-color-surface-container); padding: 12px 20px; padding-top: max(12px, env(safe-area-inset-top)); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--md-sys-color-outline-variant); z-index: 10; }
        .chat-title-area { display: flex; flex-direction: column; }
        .chat-title { font-size: 16px; font-weight: 600; color: white; display: flex; align-items: center; gap: 8px;}
        .status-dot { width: 8px; height: 8px; background: var(--md-sys-color-success); border-radius: 50%; }
        .chat-subtitle { font-size: 12px; color: var(--md-sys-color-outline); margin-top: 2px;}
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: var(--md-sys-color-surface); -webkit-overflow-scrolling: touch; }
        
        /* Chat Bubbles */
        .msg { max-width: 85%; padding: 12px 16px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; display: flex; flex-direction: column; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .msg-time { font-size: 11px; color: var(--md-sys-color-outline); margin-top: 6px; display: flex; justify-content: flex-end; align-items: center; gap: 4px; }
        .msg-user { align-self: flex-end; background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); border-radius: 20px 20px 4px 20px; }
        .msg-admin { align-self: flex-start; background: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface); border-radius: 20px 20px 20px 4px; }
        .msg-sender-name { font-size: 12px; font-weight: 600; color: var(--md-sys-color-primary); margin-bottom: 6px; }
        
        /* Read Receipts */
        .tick { font-size: 14px; color: var(--md-sys-color-outline); }
        .tick-read { color: #4285F4; } /* Blue for read */

        /* Typing Indicator with Avatar Spinner */
        .typing-container { display: flex; gap: 12px; align-items: center; align-self: flex-start; margin-top: 8px; margin-bottom: 8px; }
        .avatar-wrapper { position: relative; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-primary); font-weight: 600; font-size: 14px;}
        .avatar-spinner { position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid transparent; border-top-color: var(--md-sys-color-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        .typing-text { font-size: 13px; color: var(--md-sys-color-on-surface-variant); font-style: italic; }

        /* Chat Input Area - Optimized for Mobile Keyboards */
        .chat-input-area { background: var(--md-sys-color-surface-container); padding: 12px 16px; padding-bottom: max(16px, env(safe-area-inset-bottom)); display: flex; gap: 12px; border-top: 1px solid var(--md-sys-color-outline-variant); align-items: center; z-index: 10; }
        .chat-input { flex: 1; background: var(--md-sys-color-surface); border: 1px solid var(--md-sys-color-outline-variant); border-radius: var(--radius-full); padding: 14px 20px; color: white; font-family: var(--font-family-base); font-size: 16px; /* 16px prevents iOS auto-zoom */ transition: border-color 0.2s; }
        .chat-input:focus { outline: none; border-color: var(--md-sys-color-primary); }
        .send-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.1s; }
        .send-btn:active { transform: scale(0.9); }
        .send-btn .material-icons-round { font-size: 22px; margin-left: 2px; }

        .system-msg { align-self: center; font-size: 12px; color: var(--md-sys-color-outline); background: var(--md-sys-color-surface-container); padding: 6px 16px; border-radius: var(--radius-full); margin: 8px 0; }

        /* ===== ADMIN UI ===== */
        .admin-header { background: var(--md-sys-color-surface-container); padding: 16px 24px; padding-top: max(16px, env(safe-area-inset-top)); display: flex; justify-content: space-between; align-items: center; }
        .admin-content { flex: 1; padding: 24px; padding-bottom: max(24px, env(safe-area-inset-bottom)); overflow-y: auto; max-width: 1000px; margin: 0 auto; width: 100%; -webkit-overflow-scrolling: touch; }
        .admin-actions { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        
        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .case-card { background: var(--md-sys-color-surface-container); border: 1px solid var(--md-sys-color-outline-variant); border-radius: var(--radius-xl); padding: 20px; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .case-card:hover { background: var(--md-sys-color-surface-container-high); cursor: pointer; }
        .case-info h3 { font-size: 16px; font-weight: 600; color: white; margin-bottom: 6px; letter-spacing: 0.5px; }
        .badge { font-size: 11px; padding: 4px 10px; border-radius: var(--radius-full); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-active { background: rgba(129, 201, 149, 0.15); color: var(--md-sys-color-success); border: 1px solid rgba(129, 201, 149, 0.3); }
        .badge-closed { background: rgba(242, 184, 181, 0.15); color: var(--md-sys-color-error); border: 1px solid rgba(242, 184, 181, 0.3); }

        /* ===== MODALS ===== */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: var(--md-sys-color-surface-container); border-radius: var(--radius-xl); width: 90%; max-width: 400px; border: 1px solid var(--md-sys-color-outline-variant); padding: 32px 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.2,0,0,1); }
        .modal.show .modal-content { transform: scale(1); }
        .modal-title { font-size: 22px; color: white; margin-bottom: 24px; font-weight: 500; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px; }
    </style>
</head>
<body>

    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="auth-box">
                <div class="logo-icon"><span class="material-icons-round" style="font-size: 36px;">support_agent</span></div>
                <h1 style="font-size: 24px; font-weight: 500; color: white; margin-bottom: 8px;">PlayCode Support</h1>
                <p style="color: var(--md-sys-color-outline); margin-bottom: 32px; font-size: 14px;">Workspace Connect</p>
                
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="display: block; font-size: 13px; font-weight: 500; color: var(--md-sys-color-on-surface-variant); margin-bottom: 8px; letter-spacing: 0.5px;">CASE ID OR ADMIN ID</label>
                    <input type="text" id="loginId" class="form-control" placeholder="Enter ID to connect" autocomplete="off">
                </div>
                <div style="margin-bottom: 32px; text-align: left;" id="loginNameGroup">
                    <label style="display: block; font-size: 13px; font-weight: 500; color: var(--md-sys-color-on-surface-variant); margin-bottom: 8px; letter-spacing: 0.5px;">YOUR FULL NAME</label>
                    <input type="text" id="loginName" class="form-control" placeholder="E.g. Sarim Khan" autocomplete="off">
                </div>
                <button class="btn btn-primary btn-block" onclick="window.handleLogin()" style="font-size: 15px; height: 52px;">Connect to Support</button>
            </div>
        </div>
    </div>

    <div id="loaderScreen" class="screen loader-screen">
        <div class="pulse-dot"></div>
        <div id="loaderText">Verify</div>
    </div>

    <div id="chatScreen" class="screen">
        <div class="chat-header">
            <div class="chat-title-area">
                <div class="chat-title">
                    <div class="status-dot" id="chatStatusDot"></div>
                    <span id="chatHeaderTitle">Support Agent</span>
                </div>
                <div class="chat-subtitle" id="chatHeaderSubtitle">Case: ...</div>
            </div>
            <div style="display: flex; gap: 12px;" id="chatActions">
                </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            </div>
        
        <div class="chat-input-area" id="chatInputArea">
            <input type="text" id="msgInput" class="chat-input" placeholder="Type a message..." autocomplete="off" onkeypress="window.checkEnter(event)">
            <button class="send-btn" id="sendBtn" onclick="window.sendMessage()"><span class="material-icons-round">send</span></button>
        </div>
    </div>

    <div id="adminScreen" class="screen">
        <div class="admin-header">
            <h2 style="color: white; font-size: 20px; font-weight: 500;">Admin Workspace</h2>
            <button class="btn btn-secondary" style="min-height: 36px; padding: 0 16px; font-size: 13px;" onclick="window.logout()">Sign Out</button>
        </div>
        <div class="admin-content">
            <div class="admin-actions">
                <button class="btn btn-primary" onclick="window.generateNewCase()"><span class="material-icons-round">add</span> Generate Case ID</button>
                <button class="btn btn-secondary" onclick="window.showJoinModal()"><span class="material-icons-round">login</span> Join Any Case</button>
            </div>

            <h2 style="color: white; font-size: 18px; font-weight: 500; margin-bottom: 16px;">Active Cases</h2>
            <div class="case-grid" id="activeCasesGrid"></div>

            <h2 style="color: white; font-size: 18px; font-weight: 500; margin-bottom: 16px; margin-top: 24px;">Closed Cases</h2>
            <div class="case-grid" id="closedCasesGrid"></div>
        </div>
    </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">Admin Authentication</h2>
            <input type="password" id="adminPassword" class="form-control" placeholder="Enter Admin Password">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="window.closeModal('passwordModal')">Cancel</button>
                <button class="btn btn-primary" onclick="window.verifyAdmin()">Login</button>
            </div>
        </div>
    </div>

    <div id="joinModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">Join Case</h2>
            <input type="text" id="joinCaseId" class="form-control" placeholder="Enter Case ID" style="margin-bottom: 20px;">
            <input type="text" id="adminDisplayName" class="form-control" placeholder="Your Display Name (e.g. Agent Som)">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="window.closeModal('joinModal')">Cancel</button>
                <button class="btn btn-primary" onclick="window.executeJoinCase()">Join Chat</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLpIH68Ad1dY460yXsk7yXIygs7JBZc_U",
            authDomain: "playcode-23006.firebaseapp.com",
            databaseURL: "https://playcode-23006-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "playcode-23006",
            storageBucket: "playcode-23006.firebasestorage.app",
            messagingSenderId: "638483480224",
            appId: "1:638483480224:web:4fe80fd15137f030add3c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State variables
        let currentRole = null; 
        let currentCaseId = null;
        let myName = null;
        let caseStatus = 'active';
        let messagesListener = null;
        let currentMessagesData = null;
        let typingTimeout = null;
        let renderedMsgIds = new Set();
        let isFirstLoad = true;

        // Sounds
        const sendSound = new Audio('data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq'); 
        const recvSound = new Audio('data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq'); 
        
        function playSound(type) {
            try { if(type === 'send') sendSound.play(); else recvSound.play(); } catch(e) {}
        }

        // --- View & Navigation ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        window.closeModal = function(id) {
            document.getElementById(id).classList.remove('show');
            setTimeout(() => { document.getElementById(id).style.display = 'none'; }, 300);
        }

        function openModal(id) {
            const m = document.getElementById(id);
            m.style.display = 'flex';
            setTimeout(() => { m.classList.add('show'); }, 10);
        }

        // --- Login Flow ---
        document.getElementById('loginId').addEventListener('input', function(e) {
            const val = e.target.value.trim();
            document.getElementById('loginNameGroup').style.display = (val === 'Admin@playcode') ? 'none' : 'block';
        });

        window.handleLogin = function() {
            const inputId = document.getElementById('loginId').value.trim();
            const inputName = document.getElementById('loginName').value.trim();
            
            if(!inputId) return alert("Please enter an ID");

            if(inputId === "Admin@playcode") {
                document.getElementById('adminPassword').value = '';
                openModal('passwordModal');
            } else {
                if(!inputName) return alert("Please enter your name to connect.");
                
                runVerificationSequence(() => {
                    const caseRef = ref(db, `cases/${inputId}`);
                    get(caseRef).then(snapshot => {
                        if(snapshot.exists()) {
                            currentRole = 'user';
                            currentCaseId = inputId;
                            myName = inputName;
                            initChatUI(snapshot.val().status);
                        } else {
                            alert("Case ID not found or invalid.");
                            showScreen('loginScreen');
                        }
                    }).catch(err => {
                        alert("Network error: " + err.message);
                        showScreen('loginScreen');
                    });
                });
            }
        }

        window.verifyAdmin = function() {
            const pass = document.getElementById('adminPassword').value;
            if(pass === "Som@6215") {
                window.closeModal('passwordModal');
                currentRole = 'admin';
                showScreen('adminScreen');
                loadAdminDashboard();
            } else {
                alert("Incorrect Password!");
            }
        }

        function runVerificationSequence(callback) {
            showScreen('loaderScreen');
            const textEl = document.getElementById('loaderText');
            textEl.innerText = 'Verify';
            setTimeout(() => { textEl.innerText = 'Please wait'; }, 1000);
            setTimeout(() => { textEl.innerText = 'Still trying to verify'; }, 2500);
            setTimeout(() => { callback(); }, 4000); 
        }

        // --- Chat System Logic ---
        function initChatUI(status) {
            caseStatus = status;
            showScreen('chatScreen');
            document.getElementById('chatHeaderSubtitle').innerText = `Case: ${currentCaseId}`;
            isFirstLoad = true;
            renderedMsgIds.clear();
            
            const actionsDiv = document.getElementById('chatActions');
            if(currentRole === 'admin') {
                document.getElementById('chatHeaderTitle').innerText = 'User Chat';
                actionsDiv.innerHTML = `
                    <button class="btn btn-danger" style="min-height: 36px; padding: 0 16px; font-size: 13px;" onclick="window.closeCurrentCase()">Close Case</button>
                    <button class="btn btn-secondary" style="min-height: 36px; padding: 0 16px; font-size: 13px;" onclick="window.leaveChat()">Back</button>
                `;
            } else {
                document.getElementById('chatHeaderTitle').innerText = 'Support Agent';
                actionsDiv.innerHTML = `<button class="btn btn-secondary" style="min-height: 36px; padding: 0 16px; font-size: 13px;" onclick="window.leaveChat()">Leave</button>`;
            }

            // Sync Messages
            const msgsRef = ref(db, `messages/${currentCaseId}`);
            if(messagesListener) messagesListener(); 
            
            messagesListener = onValue(msgsRef, (snapshot) => {
                currentMessagesData = snapshot.val() || {};
                renderMessages();
                setTimeout(()=>{ isFirstLoad = false; }, 500);
            });

            // Watch for case closure
            onValue(ref(db, `cases/${currentCaseId}`), (snapshot) => {
                if(snapshot.exists() && snapshot.val().status === 'closed') {
                    caseStatus = 'closed';
                    renderMessages(); // Forces UI lock
                }
            });
        }

        function renderMessages() {
            clearTimeout(typingTimeout);
            const msgBox = document.getElementById('chatMessages');
            
            // Remember scroll position for auto-scroll
            const isScrolledToBottom = msgBox.scrollHeight - msgBox.scrollTop <= msgBox.clientHeight + 50;

            let html = '<div class="system-msg">Chat connected securely.</div>';
            if(caseStatus === 'closed') html += '<div class="system-msg" style="color:var(--md-sys-color-error)">This case has been closed by support.</div>';

            let hasTyping = false;
            let earliestFuture = Infinity;
            let typingAgentName = "Agent";
            let unreadUpdates = {};
            const now = Date.now();

            // Process Messages
            if(currentMessagesData) {
                const keys = Object.keys(currentMessagesData).sort((a,b) => currentMessagesData[a].timestamp - currentMessagesData[b].timestamp);
                
                keys.forEach(key => {
                    const m = currentMessagesData[key];
                    const isMe = m.senderRole === currentRole;

                    // 3 Second Virtualization Logic (Admin -> User only)
                    if (!isMe && m.hiddenUntil && m.hiddenUntil > now) {
                        hasTyping = true;
                        typingAgentName = m.senderName;
                        if (m.hiddenUntil < earliestFuture) earliestFuture = m.hiddenUntil;
                        return; // Skip rendering this message bubble for now
                    }

                    // Mark as read if the other person sent it and it's visible now
                    if (!isMe && !m.read) {
                        m.read = true;
                        unreadUpdates[`messages/${currentCaseId}/${key}/read`] = true;
                    }

                    // Trigger sound for new messages
                    if (!renderedMsgIds.has(key)) {
                        renderedMsgIds.add(key);
                        if (!isFirstLoad) playSound(isMe ? 'send' : 'recv');
                    }

                    // Format message
                    const timeStr = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    // Tick logic for the sender
                    let tickHtml = '';
                    if (isMe) {
                        tickHtml = `<span class="material-icons-round tick ${m.read ? 'tick-read' : ''}">${m.read ? 'done_all' : 'check'}</span>`;
                    }

                    html += `
                        <div class="msg ${isMe ? 'msg-user' : 'msg-admin'}">
                            <div class="msg-sender-name">${isMe ? 'You' : m.senderName}</div>
                            <div>${m.text}</div>
                            <div class="msg-time">${timeStr} ${tickHtml}</div>
                        </div>
                    `;
                });
            }

            // Append Typing Indicator if needed
            if (hasTyping) {
                const initial = typingAgentName.charAt(0).toUpperCase();
                html += `
                    <div class="typing-container">
                        <div class="avatar-wrapper">
                            <div class="avatar-spinner"></div>
                            <div>${initial}</div>
                        </div>
                        <div class="typing-text">${typingAgentName} is typing...</div>
                    </div>
                `;
            }

            msgBox.innerHTML = html;

            // Lock input if closed
            const inputArea = document.getElementById('chatInputArea');
            if(caseStatus === 'closed') {
                document.getElementById('chatStatusDot').style.background = 'var(--md-sys-color-outline)';
                inputArea.style.display = 'none';
            } else {
                document.getElementById('chatStatusDot').style.background = 'var(--md-sys-color-success)';
                inputArea.style.display = 'flex';
            }

            // Auto-scroll
            if (isScrolledToBottom || hasTyping || !isFirstLoad) {
                msgBox.scrollTop = msgBox.scrollHeight;
            }

            // Push read receipts to DB
            if (Object.keys(unreadUpdates).length > 0) {
                update(ref(db), unreadUpdates);
            }

            // Re-render when the hidden timer expires
            if (hasTyping) {
                typingTimeout = setTimeout(renderMessages, earliestFuture - Date.now() + 100);
            }
        }

        window.checkEnter = function(e) {
            if(e.key === 'Enter') window.sendMessage();
        }

        window.sendMessage = function() {
            if(caseStatus === 'closed') return;
            
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            input.value = '';
            
            const msgData = {
                senderRole: currentRole,
                senderName: myName,
                text: text,
                timestamp: Date.now(),
                read: false
            };

            // Inject 3s delay logic for admin messages sent to user
            if (currentRole === 'admin') {
                msgData.hiddenUntil = Date.now() + 3000;
            }
            
            push(ref(db, `messages/${currentCaseId}`), msgData);
        }

        window.leaveChat = function() {
            if(messagesListener) messagesListener(); 
            currentCaseId = null;
            if(currentRole === 'admin') {
                showScreen('adminScreen');
            } else {
                currentRole = null;
                document.getElementById('loginId').value = '';
                document.getElementById('loginName').value = '';
                showScreen('loginScreen');
            }
        }

        window.closeCurrentCase = function() {
            if(!confirm("Are you sure you want to close this case?")) return;
            const caseRef = ref(db, `cases/${currentCaseId}`);
            update(caseRef, { status: 'closed' }).then(() => {
                alert("Case Closed");
                window.leaveChat();
            });
        }

        // --- Admin Dashboard Logic ---
        function loadAdminDashboard() {
            const casesRef = ref(db, 'cases');
            onValue(casesRef, (snapshot) => {
                const activeBox = document.getElementById('activeCasesGrid');
                const closedBox = document.getElementById('closedCasesGrid');
                activeBox.innerHTML = '';
                closedBox.innerHTML = '';
                
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    Object.keys(data).forEach(id => {
                        const c = data[id];
                        const html = `
                            <div class="case-card" onclick="window.preFillJoin('${id}')">
                                <div class="case-info">
                                    <h3>${id}</h3>
                                    <div style="font-size:12px; color:var(--md-sys-color-outline)">Created: ${new Date(c.createdAt).toLocaleDateString()}</div>
                                </div>
                                <div class="badge ${c.status === 'active' ? 'badge-active' : 'badge-closed'}">${c.status.toUpperCase()}</div>
                            </div>
                        `;
                        if(c.status === 'active') activeBox.innerHTML += html;
                        else closedBox.innerHTML += html;
                    });
                }
                
                if(activeBox.innerHTML === '') activeBox.innerHTML = '<div style="color:var(--md-sys-color-outline)">No active cases.</div>';
                if(closedBox.innerHTML === '') closedBox.innerHTML = '<div style="color:var(--md-sys-color-outline)">No closed cases.</div>';
            });
        }

        window.generateNewCase = function() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let randomStr = '';
            for(let i=0; i<4; i++) randomStr += chars.charAt(Math.floor(Math.random() * chars.length));
            
            const newId = `CRX-PLXX55-${randomStr}`;
            
            set(ref(db, `cases/${newId}`), {
                status: 'active',
                createdAt: Date.now()
            }).then(() => {
                alert(`New Case Generated: ${newId}\nShare this ID with the user.`);
            });
        }

        window.showJoinModal = function() {
            document.getElementById('joinCaseId').value = '';
            document.getElementById('adminDisplayName').value = 'Agent Som';
            openModal('joinModal');
        }

        window.preFillJoin = function(id) {
            document.getElementById('joinCaseId').value = id;
            document.getElementById('adminDisplayName').value = 'Agent Som';
            openModal('joinModal');
        }

        window.executeJoinCase = function() {
            const cId = document.getElementById('joinCaseId').value.trim();
            const aName = document.getElementById('adminDisplayName').value.trim();
            if(!cId || !aName) return alert("Fill all fields");

            get(ref(db, `cases/${cId}`)).then(snapshot => {
                if(snapshot.exists()) {
                    window.closeModal('joinModal');
                    currentCaseId = cId;
                    myName = aName;
                    initChatUI(snapshot.val().status);
                } else {
                    alert("Case ID does not exist.");
                }
            });
        }

        window.logout = function() {
            currentRole = null;
            document.getElementById('loginId').value = '';
            showScreen('loginScreen');
        }

    </script>
</body>
</html>
